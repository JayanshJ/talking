<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#202c33" />
<title>talking</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E💬%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="join" class="screen">
    <div class="card">
      <h1>talking</h1>
      <p>pick a name and a room. share the link with your friends. grok is already inside, waiting to roast.</p>
      <label for="name">your name</label>
      <input id="name" maxlength="24" placeholder="e.g. jayansh" autocomplete="off" />
      <label for="room">room</label>
      <input id="room" maxlength="32" placeholder="e.g. the-boys" autocomplete="off" />
      <button id="go">enter chat</button>
      <p class="hint muted">a-z, 0-9 and dashes only.</p>
    </div>
  </div>

  <div id="chat" class="screen" hidden>
    <header>
      <div class="head-left">
        <button id="leave" class="icon-btn" title="leave" aria-label="leave">‹</button>
        <div class="avatar" id="avatar">#</div>
        <div class="head-info">
          <div class="title" id="roomTitle"></div>
          <div class="meta" id="usersLine">connecting…</div>
        </div>
      </div>
      <div class="head-right">
        <span id="connState" class="conn" title="connected">●</span>
        <button id="copyLink" class="icon-btn" title="copy invite link" aria-label="copy invite link">⎘</button>
      </div>
    </header>
    <div id="cmdbar">
      <span class="cmd" data-cmd="/mute">/mute</span><span class="cmddesc">silence grok</span>
      <span class="cmdsep">·</span>
      <span class="cmd" data-cmd="/unmute">/unmute</span><span class="cmddesc">wake him up</span>
      <span class="cmdsep">·</span>
      <span class="cmddesc">say <b>grok</b> to summon him anytime</span>
    </div>
    <div id="messages" role="log" aria-live="polite"></div>
    <div class="typing" id="typing"></div>
    <form id="form" autocomplete="off">
      <input id="input" maxlength="2000" placeholder="message" autocomplete="off" />
      <button id="send" aria-label="send">➤</button>
    </form>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
